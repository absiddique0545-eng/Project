<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Internship Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f3; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 400px; }
        .btn-login { background: #00b4db; background: linear-gradient(to right, #0083b0, #00b4db); color: white; border: none; border-radius: 10px; padding: 12px; }
        .form-control:focus { box-shadow: none; border-color: #00b4db; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="mb-4">Welcome Back</h2>
        <p class="text-muted mb-4">Please login to your account</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-login w-100">Login</button>
        </form>
        <p class="mt-4">New here? <a href="{% url 'register' %}" style="color: #0083b0;">Create an account</a></p>
    </div>
</body>
</html>
