<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile | Smart Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .update-container { max-width: 700px; margin: 50px auto; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { background: #4e73df; color: white; padding: 25px; text-align: center; border: none; }
        .card-header h3 { margin: 0; font-weight: 600; letter-spacing: 1px; }
        .card-body { padding: 40px; background: #fff; }

        /* Styling Django Form Fields */
        label { font-weight: 600; color: #4e73df; margin-bottom: 8px; display: block; font-size: 0.9rem; text-transform: uppercase; }
        input[type="text"], input[type="file"], textarea, select {
            width: 100%; padding: 12px 15px; margin-bottom: 20px; border: 1px solid #ddd;
            border-radius: 10px; transition: all 0.3s ease; background: #f8f9fa;
        }
        input:focus, textarea:focus { border-color: #4e73df; outline: none; background: #fff; box-shadow: 0 0 8px rgba(78,115,223,0.2); }
        textarea { height: 100px; resize: none; }

        .btn-submit { background: #4e73df; color: white; padding: 12px 30px; border-radius: 10px; border: none; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-submit:hover { background: #2e59d9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(78,115,223,0.3); }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #858796; text-decoration: none; font-size: 0.9rem; }
        .btn-cancel:hover { color: #4e73df; }
    </style>
</head>
<body>

<div class="container update-container">
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-user-edit me-2"></i> Edit Your Profile</h3>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                {% for field in form %}
                    <div class="form-group">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}
                            <small class="text-muted d-block mb-3">{{ field.help_text }}</small>
                        {% endif %}
                        {% for error in field.errors %}
                            <p class="text-danger small">{{ error }}</p>
                        {% endfor %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-submit mt-3">
                    <i class="fas fa-check-circle me-2"></i> Save Changes
                </button>

                <a href="{% url 'student_home' %}" class="btn btn-cancel">
                    <i class="fas fa-arrow-left me-1"></i> Back to Profile
                </a>
            </form>
        </div>
    </div>
</div>

</body>
</html>
